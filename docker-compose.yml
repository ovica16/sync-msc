services:
  postgres:
    image: postgres:16-alpine
    container_name: sync-msc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncmsc
      POSTGRES_PASSWORD: syncmsc123
      POSTGRES_DB: syncmsc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncmsc -d syncmsc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
